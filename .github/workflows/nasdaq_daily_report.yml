name: Nasdaq Strategy Daily Report

on:
  schedule:
    - cron: '35 0 * * 2-6'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  daily-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r nasdaq-strategy-bot/requirements.txt

      - name: Generate daily report
        env:
          WXPUSHER_APP_TOKEN: ${{ secrets.WXPUSHER_APP_TOKEN }}
          WXPUSHER_UID: ${{ secrets.WXPUSHER_UID }}
        run: |
          PYTHONPATH=nasdaq-strategy-bot/src \
          python -m nasdaq_strategy_bot.cli daily-report \
          --project-root nasdaq-strategy-bot

      - name: Commit state updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add nasdaq-strategy-bot/data/forward_pe_history.csv nasdaq-strategy-bot/state/strategy_state.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update nasdaq strategy state"
            git push
          fi
