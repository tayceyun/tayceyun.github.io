name: Nasdaq Strategy Manual Market Data

on:
  workflow_dispatch:
    inputs:
      market_date:
        description: '美股市场日期 YYYY-MM-DD'
        required: true
        type: string
      qqq_close:
        description: 'QQQ 收盘价'
        required: true
        type: string
      qqqm_close:
        description: 'QQQM 收盘价'
        required: true
        type: string
      vix_close:
        description: 'VIX 收盘价'
        required: true
        type: string
      dry_run:
        description: 'Skip WxPusher send'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

permissions:
  contents: write

jobs:
  manual-market-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r nasdaq-strategy-bot/requirements.txt

      - name: Generate report with manual market data
        env:
          WXPUSHER_APP_TOKEN: ${{ secrets.WXPUSHER_APP_TOKEN }}
          WXPUSHER_UID: ${{ secrets.WXPUSHER_UID }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: |
          args="--force"
          if [ "$DRY_RUN" = "true" ]; then args="$args --dry-run"; fi
          PYTHONPATH=nasdaq-strategy-bot/src \
          python -m nasdaq_strategy_bot.cli daily-report \
          --project-root nasdaq-strategy-bot \
          --market-date "${{ inputs.market_date }}" \
          --qqq-close "${{ inputs.qqq_close }}" \
          --qqqm-close "${{ inputs.qqqm_close }}" \
          --vix-close "${{ inputs.vix_close }}" \
          $args

      - name: Commit state updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add nasdaq-strategy-bot/state/strategy_state.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update nasdaq market snapshot"
            git push
          fi